appId: com.vdftools.app
productName: vdf-tools
artifactName: "${productName}-${version}-${arch}.${ext}"

asar: true

directories:
  output: out
  buildResources: build

files:
  - "**/*"
  - "!build${/*}"
  - "!logs${/*}"
  - "!out${/*}"

mac:
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
  category: public.app-category.utilities

dmg:
  title: "VDF Tools"
  format: ULFO

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: zip
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Utility
