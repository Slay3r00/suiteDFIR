<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline';">
  <title>VDF Tools - Starting</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #0a0a0a;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #fafafa;
      overflow: hidden;
      position: relative;
    }

    /* Subtle white overlay */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(ellipse at top, rgba(255, 255, 255, 0.05) 0%, transparent 50%);
      pointer-events: none;
    }

    .container {
      text-align: center;
      padding: 48px;
      position: relative;
      z-index: 1;
    }

    .logo {
      font-size: 32px;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
      color: #fafafa;
    }

    .subtitle {
      font-size: 13px;
      color: #737373;
      margin-bottom: 48px;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* Loading indicator */
    .loader {
      width: 40px;
      height: 40px;
      margin: 0 auto 32px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      border-top-color: #ffffff;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .status {
      font-size: 14px;
      color: #a3a3a3;
      min-height: 22px;
      font-weight: 400;
      letter-spacing: 0.2px;
      transition: color 0.3s ease;
    }

    .status.ready {
      color: #737373;
    }

    .retry-info {
      margin-top: 16px;
      font-size: 11px;
      color: #525252;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* Bottom accent */
    .accent {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.2) 50%, transparent 100%);
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="logo">VDF Tools</div>
    <div class="subtitle">Digital Forensics</div>
    <div class="loader"></div>
    <div class="status" id="status">Starting application...</div>
    <div class="retry-info" id="retryInfo"></div>
  </div>
  <div class="accent"></div>

  <script>
    const { ipcRenderer } = require('electron');

    // Update status text
    ipcRenderer.on('update-status', (event, message) => {
      const statusEl = document.getElementById('status');
      statusEl.textContent = message;

      // Add 'ready' class for positive status
      if (message === 'Ready') {
        statusEl.classList.add('ready');
      } else {
        statusEl.classList.remove('ready');
      }
    });

    // Update retry info
    ipcRenderer.on('update-retry-info', (event, attempt, maxAttempts) => {
      if (attempt > 0) {
        document.getElementById('retryInfo').textContent = `Attempt ${attempt} of ${maxAttempts}`;
      }
    });
  </script>
</body>

</html>
