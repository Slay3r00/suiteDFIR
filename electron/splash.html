<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline';">
  <title>VDF Tools</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #151515;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #fafafa;
      overflow: hidden;
      position: relative;
    }

    .container {
      text-align: center;
      padding: 0;
      position: relative;
      z-index: 1;
    }

    .title {
      font-size: 20px;
      font-weight: 600;
      color: #fafafa;
      margin-bottom: 24px;
      letter-spacing: 0.5px;
      text-transform: none;
    }

    /* Loading indicator */
    .loader {
      width: 24px;
      height: 24px;
      margin: 0 auto 20px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      border-top-color: #ffffff;
      animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .status {
      font-size: 11px;
      color: #737373;
      min-height: 14px;
      font-weight: 500;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    .retry-info {
      margin-top: 8px;
      font-size: 9px;
      color: #404040;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="title">VDF Tools</div>
    <div class="loader"></div>
    <div class="status" id="status">Initializing</div>
    <div class="retry-info" id="retryInfo"></div>
  </div>

  <script>
    if (window.electronAPI) {
      window.electronAPI.onUpdateStatus((message) => {
        const statusEl = document.getElementById('status');
        statusEl.textContent = message;
      });

      window.electronAPI.onUpdateRetryInfo((attempt, maxAttempts) => {
        if (attempt > 0) {
          document.getElementById('retryInfo').textContent = `Attempt ${attempt} of ${maxAttempts}`;
        }
      });
    }
  </script>
</body>

</html>
</body>

</html>
